<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEY + BPM MATCHER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 13px;
  line-height: 1.4;
}
a { color: #228B22; text-decoration: none; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

h1 { font-size: 28px; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; }

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.hq-toggle {
  background: #111;
  border: 2px solid #E89030;
  color: #E89030;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  padding: 8px 16px;
  cursor: default;
  user-select: none;
}
.hq-toggle.active {
  background: #E89030;
  border-color: #E89030;
  color: #000;
}

.fav-toggle {
  background: #111;
  border: 2px solid #E89030;
  color: #E89030;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  padding: 8px 16px;
  cursor: default;
  user-select: none;
}
.fav-toggle.active {
  background: #E89030;
  border-color: #E89030;
  color: #000;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 20px;
  align-items: flex-end;
}

.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 10px; font-weight: 300; letter-spacing: 1px; color: #888; }

input[type="text"] {
  background: #111;
  border: 1px solid #333;
  color: #fff;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  width: 200px;
}
input[type="text"]:focus { border-color: #228B22; }

.key-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.key-btn {
  background: #111;
  border: 1px solid #333;
  color: #fff;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  padding: 6px 10px;
  cursor: default;
  user-select: none;
}
.key-btn.active {
  background: #228B22;
  border-color: #228B22;
  color: #000;
}

.bpm-control {
  display: flex;
  align-items: center;
  gap: 8px;
}
.bpm-control input[type="text"] { width: 60px; text-align: center; }

.search-btn {
  background: #228B22;
  border: 1px solid #228B22;
  color: #000;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 13px;
  padding: 8px 24px;
  cursor: default;
  user-select: none;
  letter-spacing: 1px;
}

.stats {
  font-size: 11px;
  font-weight: 300;
  color: #666;
  margin-bottom: 12px;
}
.stats span { color: #228B22; }

.results-table {
  width: 100%;
  border-collapse: collapse;
}
.results-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 300;
  color: #666;
  letter-spacing: 1px;
  padding: 8px 12px;
  border-bottom: 1px solid #222;
}
.results-table th.sortable { cursor: default; }
.results-table th.sortable:hover { color: #228B22; }
.results-table th .sort-arrow { font-size: 8px; margin-left: 4px; }

.results-table td {
  padding: 8px 12px;
  border-bottom: 1px solid #111;
  font-weight: 300;
}
.results-table tr:hover td { background: #0a0a0a; }

.key-cell { color: #228B22; font-weight: 700; }
.bpm-cell { font-variant-numeric: tabular-nums; }
.no-data { color: #333; }
.artist-link { color: #228B22; }

.fav-star {
  font-size: 16px;
  cursor: default;
  user-select: none;
  color: #333;
  text-align: center;
  width: 24px;
}
.fav-star.favorited { color: #228B22; }

.pagination {
  display: flex;
  gap: 4px;
  margin-top: 16px;
  align-items: center;
}
.page-btn {
  background: #111;
  border: 1px solid #333;
  color: #fff;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 11px;
  padding: 6px 10px;
  cursor: default;
  user-select: none;
}
.page-btn.active { background: #228B22; border-color: #228B22; color: #000; }
.page-btn.disabled { color: #333; }

.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-pill {
  background: #1a1a1a;
  border: 1px solid #228B22;
  color: #228B22;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-pill .remove {
  font-size: 14px;
  cursor: default;
}

.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 10px;
  font-weight: 300;
  color: #666;
}
.legend-item { display: flex; align-items: center; gap: 4px; }

.source-dot {
  width: 8px;
  height: 8px;
  display: inline-block;
}
.source-bpm { background: #444; }
.source-key { background: #228B22; }
.source-both { background: #fff; }

.pm-btn {
  background: #111;
  border: 2px solid #228B22;
  color: #228B22;
  font-family: Arial, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 13px;
  padding: 8px 24px;
  cursor: default;
  user-select: none;
  letter-spacing: 1px;
}
.pm-btn.active {
  background: #228B22;
  color: #000;
}

.pm-group {
  margin-bottom: 20px;
}
.pm-group-header {
  font-size: 12px;
  font-weight: 700;
  color: #228B22;
  margin-bottom: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #1a1a1a;
}
.pm-group-header .shift-label { color: #E89030; }
.pm-group-header .arrow { color: #666; margin: 0 8px; }
.pm-group-header .target-label { color: #fff; }

.pm-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}
.pm-table td {
  padding: 6px 12px;
  border-bottom: 1px solid #111;
  font-weight: 300;
  font-size: 12px;
}
.pm-table tr:hover td { background: #0a0a0a; }
.pm-empty { color: #333; font-size: 11px; font-weight: 300; padding: 8px 0; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #444;
  font-weight: 300;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>KEY + BPM MATCHER</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="hq-toggle" id="hqToggle">HIGH CONFIDENCE</div>
      <div class="fav-toggle" id="favToggle">FAVORITES (<span id="favCount">0</span>)</div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>SEARCH</label>
      <input type="text" id="search" placeholder="ARTIST OR TITLE">
    </div>

    <div class="control-group">
      <label>KEY (MAJOR)</label>
      <div class="key-selector" id="keyMajor"></div>
    </div>
    <div class="control-group">
      <label>KEY (MINOR)</label>
      <div class="key-selector" id="keyMinor"></div>
    </div>

    <div class="control-group">
      <label>BPM RANGE</label>
      <div class="bpm-control">
        <input type="text" id="bpmMin" placeholder="MIN" value="">
        <span style="color:#333">-</span>
        <input type="text" id="bpmMax" placeholder="MAX" value="">
      </div>
    </div>

    <div class="control-group">
      <label>&nbsp;</label>
      <div class="search-btn" id="searchBtn">SEARCH</div>
    </div>
  </div>

  <div class="filter-pills" id="filterPills"></div>

  <div class="stats" id="stats"></div>

  <table class="results-table">
    <thead>
      <tr>
        <th></th>
        <th class="sortable" data-sort="artist">ARTIST <span class="sort-arrow"></span></th>
        <th class="sortable" data-sort="title">TITLE <span class="sort-arrow"></span></th>
        <th class="sortable" data-sort="bpm">BPM <span class="sort-arrow"></span></th>
        <th class="sortable" data-sort="key">KEY <span class="sort-arrow"></span></th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

  <div class="pagination" id="pagination"></div>

  <div id="pitchMatchSection" style="display:none;margin-top:32px;border-top:1px solid #222;padding-top:20px">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div class="pm-btn" id="pmBtn">PITCH MATCH</div>
      <div class="control-group" id="pmRangeGroup" style="display:none">
        <label>SEMITONE RANGE: <span id="pmRangeVal">3</span></label>
        <input type="range" id="pmRange" min="1" max="6" value="3" style="width:120px;accent-color:#228B22">
      </div>
    </div>
    <div id="pmResults"></div>
  </div>

  <div class="empty-state" id="emptyState">SET YOUR CRITERIA AND CLICK SEARCH</div>
</div>

<script>
const NOTES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const PER_PAGE = 100;

let sortCol = 'artist';
let sortDir = 'asc';
let page = 0;
let totalResults = 0;
let hasMoreResults = false;
let selectedKeys = new Set();
let showingFavorites = false;
let hqOnly = false;
let currentTracks = [];
let hasSearched = false;
let prefetchCache = {};
let lastSearchParams = '';

function getFavorites() {
  try {
    return JSON.parse(localStorage.getItem('kbm_favorites') || '{}');
  } catch { return {}; }
}

function saveFavorites(favs) {
  localStorage.setItem('kbm_favorites', JSON.stringify(favs));
  document.getElementById('favCount').textContent = Object.keys(favs).length;
}

function toggleFavorite(track) {
  const favs = getFavorites();
  const key = (track.artist + '|||' + track.title).toLowerCase();
  if (favs[key]) {
    delete favs[key];
  } else {
    favs[key] = { artist: track.artist, title: track.title, bpm: track.bpm, key: track.key };
  }
  saveFavorites(favs);
  if (showingFavorites) {
    renderFavorites();
  } else {
    render(currentTracks);
  }
}

function isFavorited(artist, title) {
  const favs = getFavorites();
  return !!favs[(artist + '|||' + title).toLowerCase()];
}

function init() {
  document.getElementById('favCount').textContent = Object.keys(getFavorites()).length;

  const majSel = document.getElementById('keyMajor');
  NOTES.forEach(n => {
    const k = n + ' Major';
    const btn = document.createElement('div');
    btn.className = 'key-btn';
    btn.textContent = n;
    btn.dataset.key = k;
    btn.addEventListener('click', () => toggleKey(k, btn));
    majSel.appendChild(btn);
  });
  const minSel = document.getElementById('keyMinor');
  NOTES.forEach(n => {
    const k = n + ' Minor';
    const btn = document.createElement('div');
    btn.className = 'key-btn';
    btn.textContent = n;
    btn.dataset.key = k;
    btn.addEventListener('click', () => toggleKey(k, btn));
    minSel.appendChild(btn);
  });

  document.querySelectorAll('.sortable').forEach(th => {
    th.addEventListener('click', () => {
      if (!hasSearched) return;
      const col = th.dataset.sort;
      if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortCol = col; sortDir = 'asc'; }
      document.querySelectorAll('.sort-arrow').forEach(s => s.textContent = '');
      th.querySelector('.sort-arrow').textContent = sortDir === 'asc' ? '\u25B2' : '\u25BC';
      page = 0;
      fetchTracks();
    });
  });

  document.getElementById('searchBtn').addEventListener('click', () => {
    page = 0;
    hasSearched = true;
    document.getElementById('emptyState').style.display = 'none';
    fetchTracks();
  });

  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      page = 0;
      hasSearched = true;
      document.getElementById('emptyState').style.display = 'none';
      fetchTracks();
    }
  });

  document.getElementById('hqToggle').addEventListener('click', () => {
    hqOnly = !hqOnly;
    document.getElementById('hqToggle').classList.toggle('active', hqOnly);
    if (hasSearched) { page = 0; prefetchCache = {}; fetchTracks(); }
  });

  document.getElementById('favToggle').addEventListener('click', () => {
    showingFavorites = !showingFavorites;
    document.getElementById('favToggle').classList.toggle('active', showingFavorites);
    if (showingFavorites) {
      document.getElementById('emptyState').style.display = 'none';
      renderFavorites();
    } else if (hasSearched) {
      fetchTracks();
    } else {
      document.getElementById('emptyState').style.display = '';
      document.getElementById('results').innerHTML = '';
      document.getElementById('stats').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
    }
  });
}

function toggleKey(k, btn) {
  if (selectedKeys.has(k)) {
    selectedKeys.delete(k);
    btn.classList.remove('active');
  } else {
    selectedKeys.add(k);
    btn.classList.add('active');
  }
  updatePills();
}

function buildParams(pageNum) {
  const q = document.getElementById('search').value.trim();
  const bpmMin = document.getElementById('bpmMin').value.trim();
  const bpmMax = document.getElementById('bpmMax').value.trim();
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (selectedKeys.size > 0) params.set('key', Array.from(selectedKeys).join(','));
  if (bpmMin) params.set('bpmMin', bpmMin);
  if (bpmMax) params.set('bpmMax', bpmMax);
  if (hqOnly) params.set('hq', '1');
  params.set('sort', sortCol);
  params.set('dir', sortDir);
  params.set('page', pageNum);
  params.set('limit', PER_PAGE);
  return params;
}

function prefetchPage(pageNum) {
  const params = buildParams(pageNum);
  const key = params.toString();
  if (prefetchCache[key]) return;
  prefetchCache[key] = fetch('/api/search?' + key).then(r => r.json()).catch(() => null);
}

async function fetchTracks() {
  if (showingFavorites) { renderFavorites(); return; }

  const params = buildParams(page);
  const baseKey = params.toString().replace(/&?page=\d+/, '');

  if (!params.get('q') && !params.get('key') && !params.get('bpmMin') && !params.get('bpmMax')) {
    document.getElementById('stats').innerHTML = 'ENTER A SEARCH TERM, SELECT A KEY, OR SET A BPM RANGE';
    document.getElementById('results').innerHTML = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  if (baseKey !== lastSearchParams) {
    prefetchCache = {};
    lastSearchParams = baseKey;
  }

  const cacheKey = params.toString();
  document.getElementById('stats').innerHTML = 'SEARCHING...';

  try {
    let data;
    if (prefetchCache[cacheKey]) {
      data = await prefetchCache[cacheKey];
      delete prefetchCache[cacheKey];
    }
    if (!data) {
      const resp = await fetch('/api/search?' + cacheKey);
      data = await resp.json();
    }
    if (data.error) {
      document.getElementById('stats').innerHTML = data.error;
      return;
    }
    totalResults = data.total === -1 ? -1 : data.total;
    hasMoreResults = data.hasMore;
    currentTracks = data.tracks;
    render(data.tracks);
    updatePitchMatchVisibility();

    if (hasMoreResults) prefetchPage(page + 1);
    if (page > 0) prefetchPage(page - 1);
  } catch (err) {
    document.getElementById('stats').innerHTML = '<span style="color:red">SEARCH FAILED</span>';
  }
}

function renderFavorites() {
  const favs = getFavorites();
  const q = document.getElementById('search').value.trim().toLowerCase();
  const bpmMin = parseFloat(document.getElementById('bpmMin').value) || 0;
  const bpmMax = parseFloat(document.getElementById('bpmMax').value) || 999;

  let tracks = Object.values(favs).map(f => ({
    artist: f.artist, title: f.title, bpm: f.bpm, key: f.key
  }));

  if (q) tracks = tracks.filter(t => t.artist.toLowerCase().includes(q) || t.title.toLowerCase().includes(q));
  if (selectedKeys.size > 0) tracks = tracks.filter(t => t.key && selectedKeys.has(t.key));
  if (bpmMin > 0) tracks = tracks.filter(t => t.bpm && Math.round(t.bpm) >= bpmMin);
  if (bpmMax < 999) tracks = tracks.filter(t => t.bpm && Math.round(t.bpm) <= bpmMax);

  tracks.sort((a, b) => {
    let va = a[sortCol === 'key' ? 'key' : sortCol], vb = b[sortCol === 'key' ? 'key' : sortCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return va.localeCompare(vb) * (sortDir === 'asc' ? 1 : -1);
    return (va - vb) * (sortDir === 'asc' ? 1 : -1);
  });

  totalResults = tracks.length;
  currentTracks = tracks.slice(page * PER_PAGE, (page + 1) * PER_PAGE);
  render(currentTracks);
}

function render(tracks) {
  const stats = document.getElementById('stats');
  const countStr = totalResults === -1 ? (page * PER_PAGE + tracks.length) + '+' : totalResults.toLocaleString();
  stats.innerHTML = `<span>${countStr}</span> TRACKS`;

  const tbody = document.getElementById('results');
  tbody.innerHTML = tracks.map(t => {
    const bpmStr = t.bpm != null ? parseFloat(t.bpm).toFixed(1) : '-';
    const keyStr = t.key ? esc(t.key) : '-';
    const favClass = isFavorited(t.artist, t.title) ? ' favorited' : '';
    return `<tr>
      <td><span class="fav-star${favClass}" data-artist="${escAttr(t.artist)}" data-title="${escAttr(t.title)}" data-bpm="${t.bpm || ''}" data-key="${escAttr(t.key || '')}">${favClass ? '\u2605' : '\u2606'}</span></td>
      <td class="artist-link" data-artist="${escAttr(t.artist)}">${esc(t.artist)}</td>
      <td>${esc(t.title)}</td>
      <td class="bpm-cell">${bpmStr}</td>
      <td class="key-cell">${keyStr}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.fav-star').forEach(el => {
    el.addEventListener('click', () => {
      toggleFavorite({
        artist: el.dataset.artist,
        title: el.dataset.title,
        bpm: el.dataset.bpm ? parseFloat(el.dataset.bpm) : null,
        key: el.dataset.key || null
      });
    });
  });

  tbody.querySelectorAll('.artist-link').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('search').value = el.dataset.artist;
      selectedKeys.clear();
      document.querySelectorAll('.key-btn.active').forEach(b => b.classList.remove('active'));
      document.getElementById('bpmMin').value = '';
      document.getElementById('bpmMax').value = '';
      updatePills();
      page = 0;
      hasSearched = true;
      prefetchCache = {};
      document.getElementById('emptyState').style.display = 'none';
      fetchTracks();
    });
  });

  renderPagination();
}

function renderPagination() {
  const pag = document.getElementById('pagination');
  if (!hasMoreResults && page === 0 && currentTracks.length < PER_PAGE) { pag.innerHTML = ''; return; }
  const totalPages = totalResults === -1 ? page + 2 : Math.ceil(totalResults / PER_PAGE);
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  const prevClass = page === 0 ? ' disabled' : '';
  html += `<div class="page-btn${prevClass}" data-page="${page-1}">PREV</div>`;

  const maxButtons = 10;
  let startP = Math.max(0, page - Math.floor(maxButtons/2));
  let endP = Math.min(totalPages, startP + maxButtons);
  if (endP - startP < maxButtons) startP = Math.max(0, endP - maxButtons);

  for (let i = startP; i < endP; i++) {
    const active = i === page ? ' active' : '';
    html += `<div class="page-btn${active}" data-page="${i}">${i+1}</div>`;
  }

  const nextClass = page >= totalPages - 1 ? ' disabled' : '';
  html += `<div class="page-btn${nextClass}" data-page="${page+1}">NEXT</div>`;

  pag.innerHTML = html;
  pag.querySelectorAll('.page-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = parseInt(btn.dataset.page);
      if (p >= 0 && p < totalPages) {
        page = p;
        if (showingFavorites) renderFavorites();
        else fetchTracks();
        window.scrollTo(0, 0);
      }
    });
  });
}

function updatePills() {
  const pills = document.getElementById('filterPills');
  pills.innerHTML = '';
  selectedKeys.forEach(k => {
    const pill = document.createElement('div');
    pill.className = 'filter-pill';
    pill.innerHTML = esc(k) + ' <span class="remove">X</span>';
    pill.querySelector('.remove').addEventListener('click', () => {
      selectedKeys.delete(k);
      const btn = document.querySelector('.key-btn[data-key="' + k + '"]');
      if (btn) btn.classList.remove('active');
      updatePills();
    });
    pills.appendChild(pill);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let pmOpen = false;

function canPitchMatch() {
  const bpmMin = document.getElementById('bpmMin').value.trim();
  const bpmMax = document.getElementById('bpmMax').value.trim();
  return selectedKeys.size === 1 && (bpmMin || bpmMax);
}

function updatePitchMatchVisibility() {
  const section = document.getElementById('pitchMatchSection');
  if (hasSearched && canPitchMatch() && !showingFavorites) {
    section.style.display = '';
  } else {
    section.style.display = 'none';
    pmOpen = false;
    document.getElementById('pmBtn').classList.remove('active');
    document.getElementById('pmRangeGroup').style.display = 'none';
    document.getElementById('pmResults').innerHTML = '';
  }
}

async function fetchPitchMatch() {
  if (!canPitchMatch()) return;
  const key = Array.from(selectedKeys)[0];
  const bpmMin = document.getElementById('bpmMin').value.trim();
  const bpmMax = document.getElementById('bpmMax').value.trim();
  const range = document.getElementById('pmRange').value;
  const q = document.getElementById('search').value.trim();

  const params = new URLSearchParams();
  params.set('key', key);
  if (bpmMin) params.set('bpmMin', bpmMin);
  if (bpmMax) params.set('bpmMax', bpmMax);
  params.set('range', range);
  params.set('limit', '10');
  if (hqOnly) params.set('hq', '1');
  if (q) params.set('q', q);

  document.getElementById('pmResults').innerHTML = '<div style="color:#666;font-size:11px;font-weight:300">SEARCHING PITCH MATCHES...</div>';

  try {
    const resp = await fetch('/api/pitch-match?' + params.toString());
    const data = await resp.json();
    renderPitchMatch(data.results, key, bpmMin || bpmMax);
  } catch {
    document.getElementById('pmResults').innerHTML = '<div style="color:red;font-size:11px">PITCH MATCH FAILED</div>';
  }
}

function renderPitchMatch(results, targetKey, targetBpm) {
  const container = document.getElementById('pmResults');
  if (!results || results.length === 0) {
    container.innerHTML = '<div class="pm-empty">NO PITCH MATCHES FOUND</div>';
    return;
  }

  let html = '';
  const sorted = results.slice().sort((a, b) => Math.abs(a.shift) - Math.abs(b.shift));

  for (const group of sorted) {
    const dir = group.shift > 0 ? '+' : '';
    const bpmRange = group.sourceBpmMin === group.sourceBpmMax
      ? group.sourceBpmMin.toFixed(1)
      : group.sourceBpmMin.toFixed(1) + '-' + group.sourceBpmMax.toFixed(1);

    html += '<div class="pm-group">';
    html += `<div class="pm-group-header">
      <span class="shift-label">${dir}${group.shift} SEMITONE${Math.abs(group.shift) > 1 ? 'S' : ''}</span>
      <span class="arrow">&mdash;</span>
      ${esc(group.sourceKey)} @ ${bpmRange} BPM
      <span class="arrow">&rarr;</span>
      <span class="target-label">${esc(targetKey)} @ ${parseFloat(targetBpm).toFixed(1)} BPM</span>
      <span style="color:#666;font-size:10px;margin-left:8px">(${group.tracks.length} TRACK${group.tracks.length !== 1 ? 'S' : ''})</span>
    </div>`;

    if (group.tracks.length === 0) {
      html += '<div class="pm-empty">NO TRACKS IN THIS RANGE</div>';
    } else {
      html += '<table class="pm-table"><tbody>';
      for (const t of group.tracks) {
        const favClass = isFavorited(t.artist, t.title) ? ' favorited' : '';
        html += `<tr>
          <td><span class="fav-star${favClass}" data-artist="${escAttr(t.artist)}" data-title="${escAttr(t.title)}" data-bpm="${t.bpm || ''}" data-key="${escAttr(t.key || '')}">${favClass ? '\u2605' : '\u2606'}</span></td>
          <td class="artist-link" data-artist="${escAttr(t.artist)}">${esc(t.artist)}</td>
          <td>${esc(t.title)}</td>
          <td class="bpm-cell">${t.bpm != null ? parseFloat(t.bpm).toFixed(1) : '-'}</td>
          <td class="key-cell">${t.key ? esc(t.key) : '-'}</td>
        </tr>`;
      }
      html += '</tbody></table>';
    }
    html += '</div>';
  }

  container.innerHTML = html;

  container.querySelectorAll('.fav-star').forEach(el => {
    el.addEventListener('click', () => {
      toggleFavorite({
        artist: el.dataset.artist,
        title: el.dataset.title,
        bpm: el.dataset.bpm ? parseFloat(el.dataset.bpm) : null,
        key: el.dataset.key || null
      });
    });
  });

  container.querySelectorAll('.artist-link').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('search').value = el.dataset.artist;
      selectedKeys.clear();
      document.querySelectorAll('.key-btn.active').forEach(b => b.classList.remove('active'));
      document.getElementById('bpmMin').value = '';
      document.getElementById('bpmMax').value = '';
      updatePills();
      page = 0;
      hasSearched = true;
      prefetchCache = {};
      document.getElementById('emptyState').style.display = 'none';
      fetchTracks();
    });
  });
}

init();

document.getElementById('pmBtn').addEventListener('click', () => {
  pmOpen = !pmOpen;
  document.getElementById('pmBtn').classList.toggle('active', pmOpen);
  document.getElementById('pmRangeGroup').style.display = pmOpen ? '' : 'none';
  if (pmOpen) fetchPitchMatch();
  else document.getElementById('pmResults').innerHTML = '';
});

document.getElementById('pmRange').addEventListener('input', e => {
  document.getElementById('pmRangeVal').textContent = e.target.value;
  if (pmOpen) fetchPitchMatch();
});
</script>
</body>
</html>
